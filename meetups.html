<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Meetups - IBM User Group Kolkata</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/main.css">
</head>

<body>
    <!-- Universal Header Placeholder -->
    <div id="universal-header"></div>

    <!-- Page Header -->
    <section class="page-header">
        <div class="container">
            <h1 class="page-title">All Meetups</h1>
            <p class="page-subtitle">Join us at our upcoming and past events.</p>
        </div>
    </section>

    <!-- Meetups List Section -->
    <section class="py-5 my-3">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-10" id="all-meetups-container">

                    <!-- Meetups will be dynamically populated here. Showing empty state for now. -->
                    <div class="empty-state">
                        <i class="fa-regular fa-calendar-xmark"></i>
                        <h4>No Meetups Available</h4>
                        <p class="text-muted">Check back later for updates on our events!</p>
                    </div>

                </div>
            </div>
        </div>
    </section>

    <!-- Universal Footer Placeholder -->
    <div id="universal-footer"></div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/main.js"></script>
</body>

</html>
