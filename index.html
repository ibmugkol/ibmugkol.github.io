<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBM User Group Kolkata</title>
    <!-- Favicons -->
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml" media="(prefers-color-scheme: light)">
    <link rel="icon" href="assets/icon-dark.svg" type="image/svg+xml" media="(prefers-color-scheme: dark)">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts (IBM Plex) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/main.css">
    <!-- Inline script to apply theme instantly, avoiding flicker -->
    <script>
        (function() {
            let theme = 'light';
            try {
                const savedTheme = localStorage.getItem('theme');
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                theme = savedTheme || (prefersDark ? 'dark' : 'light');
            } catch (e) {
                try {
                    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                    theme = prefersDark ? 'dark' : 'light';
                } catch (err) {}
            }
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>

<body>
    <!-- Universal Header Placeholder -->
    <div id="universal-header"></div>

    <!-- Hero Section -->
    <section class="hero text-center">
        <div class="container">
            <div class="d-flex justify-content-center mb-4">
                <div class="hero-animation-wrapper">
                    <!-- Theme-dependent grid background -->
                    <img id="hero-backdrop-img" src="assets/HeroBackground-light.png" alt="Grid Backdrop" class="hero-backdrop">
                    <!-- Bob Animation overlays the backdrop -->
                    <div class="bob-animation-container">
                        <img id="bob-placeholder" src="assets/BobAnimationPlaceholder.svg" alt="IBM Bob Placeholder" class="bob-placeholder">
                        <div id="bob-lottie" class="bob-lottie-container cursor-pointer hidden" role="img" aria-label="Bob waving animation"></div>
                    </div>
                </div>
            </div>
            
            <h1 class="hero-title">IBM User Group Kolkata</h1>
            <p class="hero-subtitle">Empowering local developers and tech enthusiasts with IBM Cloud, AI, and Quantum computing innovations.</p>
            
            <div class="d-flex flex-sm-row flex-column justify-content-center gap-3">
                <a href="meetups.html" class="btn btn-custom btn-lg">Explore Our Meetups <i class="fa-solid fa-arrow-right ms-2"></i></a>
                <a href="https://bob.ibm.com/" target="_blank" class="btn btn-bob-outline btn-lg">Meet IBM Bob <i class="fa-solid fa-robot ms-2"></i></a>
            </div>
        </div>
    </section>

    <!-- Latest Meetups Section -->
    <section class="py-5 my-5">
        <div class="container">
            <div class="d-flex justify-content-between align-items-end mb-4">
                <h2 class="section-title mb-0">Latest Meetups</h2>
                <a href="meetups.html" class="text-decoration-none fw-bold" style="color: var(--primary-color);">View All <i class="fa-solid fa-chevron-right ms-1"></i></a>
            </div>

            <div class="row g-4" id="latest-meetups-container">
                <!-- Meetups will be dynamically populated here. Showing empty state for now. -->
                <div class="col-12">
                    <div class="empty-state">
                        <i class="fa-regular fa-calendar-xmark"></i>
                        <h4>No Upcoming Meetups</h4>
                        <p class="text-muted">Stay tuned! We are planning our next event.</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Universal Footer Placeholder -->
    <div id="universal-footer"></div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Lottie Web (JSON-based animations player) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.13.0/lottie.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- Bob Animation Data -->
    <script src="js/bob-wave-data.js"></script>
    <!-- Custom JS -->
    <script src="js/main.js"></script>
</body>

</html>
