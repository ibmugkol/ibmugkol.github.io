<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBM User Group Kolkata</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/main.css">
</head>

<body>
    <!-- Universal Header Placeholder -->
    <div id="universal-header"></div>

    <!-- Hero Section -->
    <section class="hero text-center">
        <div class="container">
            <h1 class="hero-title">IBM User Group Kolkata</h1>
            <p class="hero-subtitle">Empowering local developers and tech enthusiasts with IBM Cloud, AI, and Quantum
                computing innovations.</p>
            <a href="meetups.html" class="btn btn-custom btn-lg">Explore Our Meetups <i
                    class="fa-solid fa-arrow-right ms-2"></i></a>
        </div>
    </section>

    <!-- Latest Meetups Section -->
    <section class="py-5 my-5">
        <div class="container">
            <div class="d-flex justify-content-between align-items-end mb-4">
                <h2 class="section-title mb-0">Latest Meetups</h2>
                <a href="meetups.html" class="text-decoration-none fw-bold" style="color: var(--primary-color);">View
                    All <i class="fa-solid fa-chevron-right ms-1"></i></a>
            </div>

            <div class="row g-4" id="latest-meetups-container">
                <!-- Meetups will be dynamically populated here. Showing empty state for now. -->
                <div class="col-12">
                    <div class="empty-state">
                        <i class="fa-regular fa-calendar-xmark"></i>
                        <h4>No Upcoming Meetups</h4>
                        <p class="text-muted">Stay tuned! We are planning our next event.</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Universal Footer Placeholder -->
    <div id="universal-footer"></div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/main.js"></script>
</body>

</html>
